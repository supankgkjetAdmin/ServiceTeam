<script>
/* ===========================
   SERVER VARIABLESS
=========================== */
const SERVER_ENGINEER = "{{ engineer|e }}";
const SERVER_ZONE = "{{ zone|e }}";
const SERVER_ROLENAME = "{{ role|e }}";
const SERVER_TEAM = "{{ team|e }}";

/* ===========================
   LOADING OVERLAY
=========================== */
const _gOverlay = document.getElementById("globalLoadingOverlay");
const _gText = document.getElementById("globalLoadingText");
let _loadingCount = 0;
function showLoading(msg="Loading..."){
  _loadingCount++;
  _gText.textContent = msg || "Loading...";
  _gOverlay.style.display = "flex";
}
function hideLoading(){
  _loadingCount = Math.max(0, _loadingCount - 1);
  if(_loadingCount === 0){
    _gOverlay.style.display = "none";
    _gText.textContent = "Loading...";
  }
}



/* ===========================
   UTILITIES
=========================== */
function escapeHtml(v){
  if (v === null || v === undefined) return "";
  return String(v)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function uniq(arr){
  return [...new Set((arr || []).filter(Boolean).map(x => String(x).trim()).filter(Boolean))];
}
function normVal(v){
  return String(v ?? "").trim().toLowerCase().replace(/\s+/g, " ");
}
function normKey(k){
  return String(k||"")
    .toLowerCase()
    .replace(/\./g,"")
    .replace(/\s+/g,"")
    .replace(/_/g,"")
    .replace(/-/g,"");
}
function getFieldExactOrNorm(row, keys){
  if(!row) return "";
  for(const k of keys){
    if(row[k] !== undefined && row[k] !== null && String(row[k]).trim() !== "") return row[k];
  }
  const map = {};
  Object.keys(row).forEach(k => map[normKey(k)] = k);
  for(const k of keys){
    const nk = normKey(k);
    if(map[nk]){
      const v = row[map[nk]];
      if(v !== undefined && v !== null && String(v).trim() !== "") return v;
    }
  }
  return "";
}
function getFieldContains(row, patterns){
  if(!row) return "";
  const keys = Object.keys(row || {});
  const normMap = keys.map(k => ({ k, nk: normKey(k) }));
  for(const p of patterns){
    const np = normKey(p);
    const hit = normMap.find(x => x.nk.includes(np));
    if(hit){
      const v = row[hit.k];
      if(v !== undefined && v !== null && String(v).trim() !== "") return v;
    }
  }
  return "";
}
function getField(row, keys, containsPatterns){
  return getFieldExactOrNorm(row, keys || []) || getFieldContains(row, containsPatterns || []) || "";
}
function getLocationFromRow(r){ return getField(r, ["LOCATION","Location","location"], ["location"]); }
function getModelFromRow(r){ return getField(r, ["Model","MODEL","model"], ["model"]); }
function getSerialFromRow(r){
  return getField(r,
    ["Serial No.","Serial No","SERIAL NO.","Serial","serialNo","serial_no","srNo","sr_no"],
    ["serial","srno","serialno"]
  );
}

/* ===========================
   NAV / ROLE / SECTION
=========================== */
function applyRoleAccess(role){
  const userRole = (role || "").trim().toLowerCase();
  const HIDE_UNAUTHORIZED = true;
  document.querySelectorAll("[data-roles]").forEach(btn=>{
    const allowedRoles = (btn.getAttribute("data-roles") || "")
      .split(",").map(x => x.trim().toLowerCase()).filter(Boolean);
    const allowed = allowedRoles.includes(userRole);
    if (allowed){
      btn.style.display = "";
      btn.classList.remove("is-disabled");
      btn.disabled = false;
    } else {
      if (HIDE_UNAUTHORIZED){ btn.style.display = "none"; }
      else { btn.classList.add("is-disabled"); btn.disabled = true; }
    }
  });
}

/* ✅ UPDATED: showSection (logic same + autosuggest ensure) */
function showSection(id, btn){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  const sec = document.getElementById(id);
  if (sec) sec.classList.add("active");
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  if(btn) btn.classList.add("active");

  // ✅ autosuggest attach when switching sections
  ensureSuggestReady();
  setupAutoTimeCalc();

}

function refillReadonly(){
  const e1 = document.getElementById("wsr_engineer");
  const z1 = document.getElementById("wsr_zone");
  const e2 = document.getElementById("wp_engineer");
  const z2 = document.getElementById("wp_zone");
  if (e1) e1.value = SERVER_ENGINEER || "";
  if (z1) z1.value = SERVER_ZONE || "";
  if (e2) e2.value = SERVER_ENGINEER || "";
  if (z2) z2.value = SERVER_ZONE || "";
}

/* ===========================
   MONTH YEAR (WSR)
=========================== */
function formatMMMYY(yyyy_mm){
  if (!yyyy_mm) return "";
  const [y,m] = yyyy_mm.split("-");
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const mon = months[(parseInt(m,10)||1)-1] || "JAN";
  const yy = String(y).slice(-2);
  return `${mon}-${yy}`;
}

async function loadClusterSummary() {

  showLoading("Loading Cluster Summary...");
  if ($.fn.DataTable.isDataTable('#clusterSummaryTable')) {

  }

  try {

    const res = await fetch("/api/installbase/month-cluster-details");
    const data = await res.json();

    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    if (!data.columns || !data.rows) return;

    // ======================
    // HEADER
    // ======================
    const trHead = document.createElement("tr");
    data.columns.forEach(col => {
      const th = document.createElement("th");
      th.textContent = col;
      trHead.appendChild(th);
    });
    thead.appendChild(trHead);

    // ======================
    // BODY
    // ======================
    data.rows.forEach(r => {
      const tr = document.createElement("tr");
      data.columns.forEach(c => {
        const td = document.createElement("td");
        const value = r[c] ?? "";

        if(colName.includes("status")){
          const span = document.createElement("span");
          span.textContent = value;
          const v = String(value).toLowerCase();
          if(v === "completed"){
            span.className = "status-completed";
          }
          else if(v === "pending"){
            span.className = "status-pending";
          }
          td.appendChild(span);
        }else{
          td.textContent = value;
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    // ======================
    // ROW COUNT
    // ======================
    const rc = document.getElementById("clusterRowCount");
    if (rc) rc.textContent = data.rows.length;
    initCommonDataTable("clusterSummaryTable");
    

    // ======================
    // 🔥 AUTO ENGINEER LOAD (TABLE SE DIRECT)
    // ======================

    const engineerSet = new Set();

    const headerCells = table.querySelectorAll("thead th");

    let engineerIndex = -1;

    headerCells.forEach((th, i) => {
      if (th.textContent.trim().toLowerCase().includes("engineer")) {
        engineerIndex = i;
      }
    });

    if (engineerIndex !== -1) {

      const rows = table.querySelectorAll("tbody tr");

      rows.forEach(row => {
        const eng = row.children[engineerIndex]?.textContent.trim();
        if (eng) engineerSet.add(eng);
      });
    }

    const select = document.getElementById("engineerFilter");

    if (select) {
      select.innerHTML = `<option value="">All Engineers</option>`;

      [...engineerSet].sort().forEach(e => {
        const opt = document.createElement("option");
        opt.value = e;
        opt.textContent = e;
        select.appendChild(opt);
      });
    }

  } catch (err) {
    console.error("Cluster summary error:", err);
  } finally {
    hideLoading();
  }
}

const VISIT_TYPE_COLOR = {
  "Cluster": "#1a73e8",
  "Breakdown": "#e53935",
  "Sales Support": "#2e7d32",
  "Other": "#8e24aa"
};
const AMC_STATUS_COLOR = {
  "AMC": "#2e7d32",
  "NON AMC": "#1a73e8",
  "WARRANTY": "#e53935",
  "NOT IN USE": "#9e9e9e",
};

function renderCssDonutTo(elId, labels, values){
  const total = values.reduce((a,b)=>a+b,0);
  const ring = document.getElementById(elId);
  if(!ring) return;

  if(total <= 0){
    ring.style.background = "conic-gradient(#e5e7eb 0deg 360deg)";
    return;
  }

  let acc = 0;
  const parts = labels.map((l,i)=>{
    const v = Number(values[i]||0);
    const start = (acc/total)*360;
    acc += v;
    const end = (acc/total)*360;

    // 🔥 FIX HERE
    let color =
      VISIT_TYPE_COLOR[l] ||
      AMC_STATUS_COLOR[l] ||
      "#64748b";

    return `${color} ${start}deg ${end}deg`;
  });

  ring.style.background = `conic-gradient(${parts.join(",")})`;
}
function renderLegendTo(hostId, labels, colors, values, onClick){
  const host = document.getElementById(hostId);
  if(!host) return;
  host.innerHTML = "";
  labels.forEach((name, i)=>{
    const row = document.createElement("div");
    row.className = "legendItem2";
    row.style.cursor = "pointer";

    row.innerHTML = `
      <span class="legendDot2" style="background:${colors[i]}"></span>
      <span>${name}</span>
      <span class="legendCount2">${values[i]}</span>
    `;
    if(onClick) row.addEventListener("click", ()=> onClick(name));
    host.appendChild(row);
  });
}

function openWeekly14Days(type){

  const pad = n => String(n).padStart(2,'0');
  const today = new Date();

  const fromD = new Date(today);
  fromD.setDate(fromD.getDate() - 7);

  const toD = new Date(today);
  toD.setDate(toD.getDate() + 7);

  const from = `${fromD.getFullYear()}-${pad(fromD.getMonth()+1)}-${pad(fromD.getDate())}`;
  const to   = `${toD.getFullYear()}-${pad(toD.getMonth()+1)}-${pad(toD.getDate())}`;

  // ✅ Redirect to separate HTML file
  window.location.href =
  `/weekly-plan-report?visitType=${encodeURIComponent(type)}&from=${from}&to=${to}`;
}

function renderTable(columns, rows) {

  const wrap = document.createElement("div");
  wrap.style.overflow = "auto";
  wrap.style.maxHeight = "70vh";
  wrap.style.border = "1px solid #e5e7eb";
  wrap.style.borderRadius = "12px";

  const table = document.createElement("table");
  table.id = "mcStatusDataTable";  
  table.className = "display";
  table.style.borderCollapse = "collapse";
  table.style.minWidth = "1600px";

  const thead = document.createElement("thead");
  const trHead = document.createElement("tr");

  columns.forEach(col => {
    const th = document.createElement("th");
    th.textContent = col;
    trHead.appendChild(th);
  });

  thead.appendChild(trHead);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");

  rows.forEach(row => {
    const tr = document.createElement("tr");

    columns.forEach(col => {
      const td = document.createElement("td");
      let val = row[col] ?? "";
      if(col === "DATE" || col === "EXPIRY_DATE"){
        const d = new Date(val);
        if(!isNaN(d)){
          const day = String(d.getDate()).padStart(2,'0');
          const mon = String(d.getMonth()+1).padStart(2,'0');
          const yr  = d.getFullYear();
          val = day + "-" + mon + "-" + yr;
        }
      }
      td.textContent = val;
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrap.appendChild(table);

  return wrap;
}

async function loadReport(){

  const errBox = document.getElementById("reportErr");
  if(errBox) errBox.textContent = "";

  const q = (document.getElementById("reportSearch")?.value || "").trim();
  const from = document.getElementById("fromDate")?.value || "";
  const to   = document.getElementById("toDate")?.value || "";

  const params = new URLSearchParams();
  params.set("limit","2000");
  if(q) params.set("q", q);
  if(from) params.set("from", from);
  if(to) params.set("to", to);

  showLoading("Loading report...");
  try{
    const res = await fetch("/api/wsr-report?" + params.toString());
    const data = await res.json();

    if (!res.ok || data.error){
      if(errBox) errBox.textContent = data.error || "Report load error";
      return;
    }

    const thead = document.querySelector("#dataTable thead");
    const tbody = document.querySelector("#dataTable tbody");
    if(!thead || !tbody) return;
    thead.innerHTML = "";
    tbody.innerHTML = "";

    function norm(s){
      return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g,"");
    }

    const apiCols = Array.isArray(data.columns) ? data.columns : [];
    const rows    = Array.isArray(data.rows) ? data.rows : [];

    const desired = [
      "ID","ZONE","Engineer Name","MMM-YY","Service report Number","Customer name",
      "Location","Contact Person Name","Designation","Contact Number","E-mail id",
      "Call Logged Date","Problem reported","Machine Status","Visit Code 1","Visit Code 2",
      "Printer Model","M/C No","Serial No","Ink Type","Turn on Time","Print on time",
      "Visit Date","Travel Start (HH:MM)","Travel End (HH:MM)","TRAVEL TIME",
      "Work Start (HH:MM)","Work End (HH:MM)","WORK TIME","Action Taken (in brief)",
      "INK","Solvent","CNC","Filter Kit Due Date/Hrs","Customer Feedback","Call Status",
      "Re-visit Required","Service Engineer Remarks","Service Manager Remarks"
    ];

    const apiColsNorm = new Map(apiCols.map(c => [norm(c), c]));
    const desiredActual = desired.map(d => apiColsNorm.get(norm(d))).filter(Boolean);
    const remaining = apiCols.filter(c => !desiredActual.includes(c));
    const cols = [...desiredActual, ...remaining];

    if(!cols.length){
      if(errBox) errBox.textContent = "No columns from API";
      return;
    }

    const trh = document.createElement("tr");
    cols.forEach(h=>{
      const th = document.createElement("th");
      th.textContent = h;
      trh.appendChild(th);
    });
    thead.appendChild(trh);

    const rc = document.getElementById("reportRowCount");
    if(rc) rc.textContent = String(rows.length || 0);

    rows.forEach(r=>{
      const tr = document.createElement("tr");
      cols.forEach(c=>{
        const td = document.createElement("td");
        td.textContent = (r[c] ?? "");
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

  }catch(e){
    if(errBox) errBox.textContent = String(e);
  }finally{
    hideLoading();
  }
}

function downloadCSV(filename, columns, rows){
  const esc = (v)=>{
    const s = String(v ?? "");
    if (/[",\n\r]/.test(s)) return `"${s.replaceAll('"','""')}"`;
    return s;
  };

  const lines = [];
  lines.push(columns.map(esc).join(","));
  rows.forEach(r=>{
    lines.push(columns.map(c => esc(r[c])).join(","));
  });

  const csv = "\ufeff" + lines.join("\r\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function attachSuggest({ inputId, boxId, sourceFn, onSelect, minChars = 2, showAllOnFocus = false }){
  const inp = document.getElementById(inputId);
  const box = document.getElementById(boxId);
  if(!inp || !box) return;

  if (inp.dataset.suggestAttached === "1") return;
  inp.dataset.suggestAttached = "1";

  let t = null;

  function close(){
    box.style.display = "none";
    box.innerHTML = "";
  }
  function open(items){
    if(!items || !items.length){ close(); return; }
    box.innerHTML = items.map(v => `
      <div class="suggestItem" data-v="${escapeHtml(v)}">${escapeHtml(v)}</div>
    `).join("");
    box.style.display = "block";
  }
  function pick(v){
    inp.value = v;
    close();
    if(onSelect) onSelect(v);
  }

  box.addEventListener("mousedown", (e)=> e.preventDefault());

  box.addEventListener("click", (e)=>{
    const it = e.target.closest(".suggestItem");
    if(!it) return;
    const v = it.getAttribute("data-v") || it.textContent || "";
    pick(v);
  });

  inp.addEventListener("input", ()=>{
    clearTimeout(t);
    const q = inp.value.trim().toLowerCase();

    // ✅ if minChars=0 allow empty list
    if(minChars > 0 && q.length < minChars){ close(); return; }

    t = setTimeout(()=>{
      const items = sourceFn(q).slice(0, 25);
      open(items);
    }, 120);
  });

  inp.addEventListener("blur", ()=> setTimeout(close, 150));

  inp.addEventListener("focus", ()=>{
    const q = inp.value.trim().toLowerCase();

    // ✅ NEW: focus pe list open, even if empty
    if(showAllOnFocus){
      const items = sourceFn(q).slice(0, 25);
      open(items);
      return;
    }

    if(q.length >= minChars){
      const items = sourceFn(q).slice(0, 25);
      open(items);
    }
  });
}

function suggestFromRows(q, getter){
  const rows = INSTALLBASE_CACHE.rows || [];
  const out = [];
  const seen = new Set();

  for(const r of rows){
    const v = String(getter(r) || "").trim();
    if(!v) continue;
    const nv = v.toLowerCase();
    if(!nv.includes(q)) continue;
    if(seen.has(nv)) continue;
    seen.add(nv);
    out.push(v);
    if(out.length >= 60) break;
  }
  return out;
}

// ---------- indices ----------
let IB_INDEX = null;

function buildInstallbaseIndex(){
  const rows = INSTALLBASE_CACHE.rows || [];
  const idx = {
    customers: new Map(),    // cust -> Set(loc)
    custLocModels: new Map(),// "cust||loc" -> Set(model)
    clmSerials: new Map(),   // "cust||loc||model" -> Set(serial)
    serialRows: new Map(),   // serial -> [rows]
    custRows: new Map(),     // cust -> [rows]
  };

  for(const r of rows){
    const cust = nstr(getCustomerFromRow(r));
    const loc  = nstr(getLocationFromRow(r));
    const model= nstr(getModelFromRow(r));
    const serial=nstr(getSerialFromRow(r));
    if(!cust) continue;

    const kc = nlow(cust);
    if(!idx.custRows.has(kc)) idx.custRows.set(kc, []);
    idx.custRows.get(kc).push(r);

    if(loc){
      if(!idx.customers.has(kc)) idx.customers.set(kc, new Set());
      idx.customers.get(kc).add(loc);

      const keyCL = `${kc}||${nlow(loc)}`;
      if(!idx.custLocModels.has(keyCL)) idx.custLocModels.set(keyCL, new Set());
      if(model) idx.custLocModels.get(keyCL).add(model);

      const keyCLM = `${kc}||${nlow(loc)}||${nlow(model)}`;
      if(!idx.clmSerials.has(keyCLM)) idx.clmSerials.set(keyCLM, new Set());
      if(serial) idx.clmSerials.get(keyCLM).add(serial);
    }

    if(serial){
      const ks = nlow(serial);
      if(!idx.serialRows.has(ks)) idx.serialRows.set(ks, []);
      idx.serialRows.get(ks).push(r);
    }
  }

  IB_INDEX = idx;
}

function ensureIndex(){
  if(!IB_INDEX) buildInstallbaseIndex();
}

// pick best row for (cust, loc, model, serial) preference
function pickRow({cust, loc, model, serial}){
  ensureIndex();
  const kc = nlow(cust);
  const kl = nlow(loc);
  const km = nlow(model);
  const ks = nlow(serial);

  // 1) serial exact
  if(serial && IB_INDEX.serialRows.has(ks)){
    const list = IB_INDEX.serialRows.get(ks);
    // prefer matching cust/loc/model if provided
    let best = list.find(r =>
      (!cust || nlow(getCustomerFromRow(r)) === kc) &&
      (!loc  || nlow(getLocationFromRow(r)) === kl) &&
      (!model|| nlow(getModelFromRow(r)) === km)
    );
    return best || list[0];
  }

  // 2) cust rows fallback
  const cr = IB_INDEX.custRows.get(kc) || [];
  let best = cr.find(r =>
    (!loc  || nlow(getLocationFromRow(r)) === kl) &&
    (!model|| nlow(getModelFromRow(r)) === km)
  );
  return best || cr[0] || null;
}

// ---------- cascading for a form (WSR / Weekly) ----------
function setupCascadeForForm(cfg){
  // cfg: { customerId, locationId, modelId, serialId, contactPersonId, contactNumberId, emailId, machineStatusId, mcNoId, printerStatusId, inkTypeId }

  const custEl = document.getElementById(cfg.customerId);
  const locEl  = document.getElementById(cfg.locationId);
  const modEl  = document.getElementById(cfg.modelId);
  const serEl  = document.getElementById(cfg.serialId);
  if(!custEl || !locEl || !modEl || !serEl) return;

  // prevent double setup
  if(custEl.dataset.cascadeAttached === "1") return;
  custEl.dataset.cascadeAttached = "1";

  // Make these inputs empty when upstream changes
  function resetAfterCustomer(){
    clearVal(cfg.locationId);
    clearVal(cfg.modelId);
    clearVal(cfg.serialId);
    
    // also clear machine details
    if(cfg.machineStatusId) clearVal(cfg.machineStatusId);
    if(cfg.printerStatusId) clearVal(cfg.printerStatusId);
    if(cfg.mcNoId) clearVal(cfg.mcNoId);
    if(cfg.inkTypeId) clearVal(cfg.inkTypeId);
    if(cfg.filterKitDueId) clearVal(cfg.filterKitDueId);
    if(cfg.amcDueDateId) clearVal(cfg.amcDueDateId);
    if(cfg.filterDueId)  clearVal(cfg.filterDueId);



  }
  function resetAfterLocation(){
    clearVal(cfg.modelId);
    clearVal(cfg.serialId);
    if(cfg.amcDueDateId) clearVal(cfg.amcDueDateId);
    if(cfg.filterDueId)  clearVal(cfg.filterDueId);


    if(cfg.machineStatusId) clearVal(cfg.machineStatusId);
    if(cfg.printerStatusId) clearVal(cfg.printerStatusId);
    if(cfg.mcNoId) clearVal(cfg.mcNoId);
    if(cfg.inkTypeId) clearVal(cfg.inkTypeId);
    if(cfg.filterKitDueId) clearVal(cfg.filterKitDueId);
  }

  function resetAfterModel(){
    clearVal(cfg.serialId);
    if(cfg.machineStatusId) clearVal(cfg.machineStatusId);
    if(cfg.printerStatusId) clearVal(cfg.printerStatusId);
    if(cfg.mcNoId) clearVal(cfg.mcNoId);
    if(cfg.inkTypeId) clearVal(cfg.inkTypeId);
    if(cfg.filterKitDueId) clearVal(cfg.filterKitDueId);   // ✅ add
    if(cfg.amcDueDateId) clearVal(cfg.amcDueDateId);
    if(cfg.filterDueId)  clearVal(cfg.filterDueId);

  }
 

  // ---- CUSTOMER SELECT hook ----
  custEl.addEventListener("change", ()=>{
    const cust = nstr(custEl.value);
    if(!cust) return;
    ensureIndex();
    resetAfterCustomer();

    // fill contact from best row for customer (if exists)
    const row = pickRow({cust});
    if(row){
      if(cfg.contactPersonId) setVal(cfg.contactPersonId, getContactPersonFromRow(row));
      if(cfg.contactNumberId) setVal(cfg.contactNumberId, getContactNumberFromRow(row));
      if(cfg.emailId) setVal(cfg.emailId, getEmailFromRow(row));
      if(cfg.filterKitDueId) setVal(cfg.filterKitDueId, getFilterKitDueFromRow(row));

    }

    // if only 1 location, auto set it
    const locSet = IB_INDEX.customers.get(nlow(cust));
    const locs = locSet ? Array.from(locSet) : [];
    if(locs.length === 1){
      locEl.value = locs[0];
      locEl.dispatchEvent(new Event("change"));
    }
  });

  // ---- LOCATION SELECT hook ----
  locEl.addEventListener("change", ()=>{
    const cust = nstr(custEl.value);
    const loc  = nstr(locEl.value);
    if(!cust || !loc) return;
    ensureIndex();
    resetAfterLocation();

    // refine contact based on cust+loc
    const row = pickRow({cust, loc});
    if(row){
      if(cfg.contactPersonId) setVal(cfg.contactPersonId, getContactPersonFromRow(row));
      if(cfg.contactNumberId) setVal(cfg.contactNumberId, getContactNumberFromRow(row));
      if(cfg.emailId) setVal(cfg.emailId, getEmailFromRow(row));
    }

    // if only 1 model, auto set it
    const keyCL = `${nlow(cust)}||${nlow(loc)}`;
    const mset = IB_INDEX.custLocModels.get(keyCL);
    const models = mset ? Array.from(mset) : [];
    if(models.length === 1){
      modEl.value = models[0];
      modEl.dispatchEvent(new Event("change"));
    }
  });

  // ---- MODEL SELECT hook ----
  modEl.addEventListener("change", ()=>{
    const cust = nstr(custEl.value);
    const loc  = nstr(locEl.value);
    const model= nstr(modEl.value);
    if(!cust || !loc || !model) return;
    ensureIndex();
    resetAfterModel();

    // if only 1 serial, auto set it
    const keyCLM = `${nlow(cust)}||${nlow(loc)}||${nlow(model)}`;
    const sset = IB_INDEX.clmSerials.get(keyCLM);
    const serials = sset ? Array.from(sset) : [];
    if(serials.length === 1){
      serEl.value = serials[0];
      serEl.dispatchEvent(new Event("change"));
    }
  });

  // ---- SERIAL SELECT hook ----
  serEl.addEventListener("change", ()=>{
    const cust = nstr(custEl.value);
    const loc  = nstr(locEl.value);
    const model= nstr(modEl.value);
    const serial= nstr(serEl.value);
    

    if(!serial) return;

    const row = pickRow({cust, loc, model, serial});
    if(!row) return;

    // fill machine details
    if(cfg.machineStatusId) setVal(cfg.machineStatusId, getMachineStatusFromRow(row));
    if(cfg.printerStatusId){const ps = getPrinterStatusFromRow(row) || getMachineStatusFromRow(row);setVal(cfg.printerStatusId, ps);
      
    }

function timeToMinutes(t){
  if(!t) return null;
  const [hh, mm] = String(t).split(":").map(Number);
  if(Number.isNaN(hh) || Number.isNaN(mm)) return null;
  return hh * 60 + mm;
}
function minutesToHHMM(mins){
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}
function diffTime(start, end){
  const s = timeToMinutes(start);
  const e = timeToMinutes(end);
  if(s === null || e === null) return "";
  let d = e - s;
  if(d < 0) d += 24 * 60; // ✅ next day handle
  return minutesToHHMM(d);
}

function setupAutoTimeCalc(){
  const tS = document.getElementById("travelStart");
  const tE = document.getElementById("travelEnd");
  const tO = document.getElementById("travelTime");

  const wS = document.getElementById("workStart");
  const wE = document.getElementById("workEnd");
  const wO = document.getElementById("workTime");

  function updateTravel(){ if(tO) tO.value = diffTime(tS?.value, tE?.value); }
  function updateWork(){ if(wO) wO.value = diffTime(wS?.value, wE?.value); }

  [tS,tE].forEach(el=>{
    if(!el) return;
    el.addEventListener("input", updateTravel);
    el.addEventListener("change", updateTravel);
  });
  [wS,wE].forEach(el=>{
    if(!el) return;
    el.addEventListener("input", updateWork);
    el.addEventListener("change", updateWork);
  });
  


  updateTravel();
  updateWork();
}

async function loadExpiry(type) {

    const data = await res.json();

        if (!isNaN(days)) {

            if (days < 0) {
                bg = "#b71c1c";        // expired
            }
            else if (days < 3) {
                bg = "#ffcccc";        // red
            }
            else if (days >= 3 && days <= 6) {
                bg = "#fff3cd";        // yellow
            }
            else if (days > 6 && days <= 15) {
                bg = "#d4edda";        // green
            }
        }

        html += `
        <tr style="background:${bg}; color:${days < 0 ? 'white' : 'black'};">
            
            <td>${row.ENGINEER || ""}</td>
            <td>${row.CUSTOMER_NAME || ""}</td>
            <td>${row.MC_SERIAL_NO || ""}</td>
            <td>${row.DATE || ""}</td>            
            <td style="font-weight:bold;">${days}</td>
            <td>${formatDate(row.EXPIRY_DATE)}</td>
        </tr>
        `;
    });

    document.getElementById("expiryTableBody").innerHTML = html;

    if (!dateString) return "";

    const year = d.getFullYear();

    return `${day}-${month}-${year}`;
}

  const mode = document.getElementById("modeOfTransport").value;
  const bikeBox = document.getElementById("bikeExtraBox");

  if(mode === "Bike"){
    bikeBox.style.display = "block";
  } else {
    bikeBox.style.display = "none";
    document.getElementById("perKmRate").value = "";
    calculateExpense();
  }
}

function calculateExpense(){

  const distance = parseFloat(document.getElementById("distanceKM").value) || 0;
  const rate = parseFloat(document.getElementById("perKmRate").value) || 0;

  const total = distance * rate;

  document.getElementById("expectedExpense").value =
    total > 0 ? total : "";
}

// Auto calculate when distance changes
document.getElementById("distanceKM").addEventListener("input", calculateExpense);


</script>


<script>

// ==========================
// 🔥 GLOBAL PERFORMANCE BOOST (SAFE)
// ==========================

// 1. CACHE INSTALLBASE (NO MULTIPLE API CALL)
let __IB_CACHE = null;
let __IB_PROMISE = null;

async function getInstallbaseCached(){
  if(__IB_CACHE) return __IB_CACHE;

  if(__IB_PROMISE) return __IB_PROMISE;

  __IB_PROMISE = fetch("/api/master/installbase?limit=2000")
    .then(r=>r.json())
    .then(data=>{
      if(!data.error){
        __IB_CACHE = { columns: data.columns || [], rows: data.rows || [] };
      }
      return __IB_CACHE;
    })
    .catch(e=>{
      __IB_PROMISE = null;
      throw e;
    });

  return __IB_PROMISE;
}


// ==========================
// 🔥 OVERRIDE ensureSuggestReady (NO LOGIC CHANGE)
// ==========================
const __oldEnsureSuggestReady = window.ensureSuggestReady;

window.ensureSuggestReady = async function(){

  try{
    if(!INSTALLBASE_CACHE?.rows?.length){
      const data = await getInstallbaseCached();
      if(data) INSTALLBASE_CACHE = data;
    }
  }catch(e){}

  if(__oldEnsureSuggestReady){
    __oldEnsureSuggestReady();
  }
};


// ==========================
// 🔥 SEARCH DEBOUNCE (SMOOTH SEARCH)
// ==========================
const __oldMasterSearch = window.masterDoSearch;
let __searchTimer;

window.masterDoSearch = function(){
  clearTimeout(__searchTimer);
  __searchTimer = setTimeout(()=>{
    if(__oldMasterSearch) __oldMasterSearch();
  }, 250);
};


// ==========================
// 🔥 LOADING OVERLAY FIX (NO FREEZE)
// ==========================
const __oldShowLoading = window.showLoading;

window.showLoading = function(msg="Loading..."){
  if(window._loadingCount === 0){
    if(__oldShowLoading) __oldShowLoading(msg);
  }
  window._loadingCount = (window._loadingCount || 0) + 1;
};


// ==========================
// 🔥 DATATABLE AUTO OPTIMIZE
// ==========================
function optimizeDataTable(tableId){

  if(!window.jQuery) return;

  const $ = window.jQuery;

  if($.fn.DataTable.isDataTable('#'+tableId)){
    $('#'+tableId).DataTable().destroy();
  }

  $('#'+tableId).DataTable({
    pageLength: 25,
    deferRender: true,      // 🔥 MAIN SPEED BOOST
    processing: true,
    autoWidth: false,
    responsive: true,
    dom: '<"dt-top"f l>rt<"dt-bottom"i p>'
  });
}


// ==========================
// 🔥 LARGE TABLE RENDER FIX
// ==========================
function safeRenderRows(rows, tbody){

  if(!rows || rows.length < 100) return false;

  let i = 0;

  function renderChunk(){

    const chunk = rows.slice(i, i + 50);

    chunk.forEach(r=>{
      const tr = document.createElement("tr");

      Object.values(r).forEach(v=>{
        const td = document.createElement("td");
        td.textContent = v ?? "";
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    i += 50;

    if(i < rows.length){
      requestAnimationFrame(renderChunk);
    }
  }

  renderChunk();
  return true;
}


// ==========================
// 🔥 AUTO BACKGROUND LOAD
// ==========================
window.addEventListener("load", ()=>{

  // background preload (no UI impact)
  setTimeout(()=>{
    getInstallbaseCached().catch(()=>{});
  }, 1000);

});

</script>
