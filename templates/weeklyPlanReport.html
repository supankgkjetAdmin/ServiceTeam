<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weekly Plan Report</title>
  <style>
    :root{
      --bg:#eef4ff; --card:#ffffff; --primary:#1a73e8;
      --text:#0f172a; --muted:#64748b; --border:#e5e7eb;
      --shadow: 0 10px 25px rgba(0,0,0,.08); --radius: 14px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Arial;background:var(--bg);color:var(--text);}

    /* ✅ overlay blur + loader */
    .overlay{
      position:fixed; inset:0;
      background:rgba(15, 23, 42, 0.10);
      backdrop-filter: blur(3px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }
    .overlay.show{ display:flex; }
    .loaderBox{
      background:#fff;border:1px solid var(--border);border-radius:14px;
      box-shadow:var(--shadow);
      padding:16px 18px;
      display:flex; align-items:center; gap:10px;
      font-weight:800;
      color:var(--text);
      min-width:220px;
      justify-content:center;
    }
    .spinner{
      width:18px;height:18px;border-radius:50%;
      border:3px solid #cbd5e1;
      border-top-color: var(--primary);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    .wrap{max-width:1200px;margin:18px auto;padding:0 14px;}
    .topbar{
      background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:14px 16px;display:flex;gap:12px;align-items:center;justify-content:space-between;
    }
    .title h1{margin:0;font-size:18px}
    .title .sub{color:var(--muted);font-size:13px;margin-top:2px}
    .btn{
      border:none;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:800;
      background:#fff;border:1px solid var(--border);
    }
    .btn.primary{background:var(--primary);color:#fff;border-color:transparent;}
    .card{
      margin-top:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:16px;
    }
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .toolbar input{
      height:38px;padding:0 12px;border:1px solid var(--border);border-radius:12px;font-size:14px;outline:none;background:#fff;
    }
    .tableWrap{margin-top:12px;overflow:auto;border:1px solid var(--border);border-radius:12px;}
    table{width:max-content;border-collapse:collapse;font-size:13px;min-width:1100px;}
    thead th{position:sticky;top:0;background:#0b2a55;color:#fff;padding:10px;text-align:left;white-space:nowrap;}
    tbody td{border-top:1px solid var(--border);padding:10px;white-space:nowrap;}
    .muted{color:var(--muted);font-weight:700}
    .err{margin-top:10px;color:#b91c1c;font-weight:800}
  </style>
</head>
<body>

<!-- ✅ Blur + Loading -->
<div id="overlay" class="overlay">
  <div class="loaderBox">
    <div class="spinner"></div>
    <div>Loading report...</div>
  </div>
</div>

<div class="wrap">
  <div class="topbar">
    <div class="title">
      <h1>Weekly Plan Report</h1>
      <div class="sub">KGK Jet India</div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn" onclick="window.location.href='/dashboard'"> Back to Manu</button>
      <button class="btn primary" onclick="load()">Refresh</button>
    </div>
  </div>

  <div class="card">
    <div class="toolbar">
      <span class="muted">Visit Type</span>
      <input id="visitType" placeholder="Cluster / Breakdown ..." style="width:180px">
      <span class="muted">From</span>
      <input id="from" type="date">
      <span class="muted">To</span>
      <input id="to" type="date">
      <button type="button" class="btn primary" onclick="load()">Search</button>

    </div>

    <div class="muted" style="margin-top:10px;">
      Rows: <b id="rows">0</b>
    </div>

    <div id="err" class="err"></div>

    <div class="tableWrap">
      <table id="tbl">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
function qs(name){
  return new URLSearchParams(location.search).get(name) || "";
}

function setInputsFromUrl(){
  const vt = qs("visitType");
  const f  = qs("from");
  const t  = qs("to");

  document.getElementById("visitType").value = vt;
  document.getElementById("from").value = f;
  document.getElementById("to").value = t;
}

function showLoading(show){
  const ov = document.getElementById("overlay");
  if(show) ov.classList.add("show");
  else ov.classList.remove("show");
}

async function load(){
  const err = document.getElementById("err");
  err.textContent = "";

  const vt = (document.getElementById("visitType").value || "").trim();
  const f  = document.getElementById("from").value || "";
  const t  = document.getElementById("to").value || "";

  const params = new URLSearchParams();
  params.set("limit","2000");
  if(vt) params.set("q", vt);
  if(f)  params.set("from", f);
  if(t)  params.set("to", t);

  showLoading(true);

  try{
    const res = await fetch("/api/wsr-report?" + params.toString());

    const data = await res.json();

    if(!res.ok || data.error){
      err.textContent = data.error || "Weekly plan report load error";
      return;
    }

    const cols = data.columns || [];
    const rows = data.rows || [];

    document.getElementById("rows").textContent = String(rows.length || 0);

    const table = document.getElementById("tbl");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");
    thead.innerHTML = "";
    tbody.innerHTML = "";

    const trh = document.createElement("tr");
    cols.forEach(c=>{
      const th = document.createElement("th");
      th.textContent = c;
      trh.appendChild(th);
    });
    thead.appendChild(trh);

    rows.forEach(r=>{
      const tr = document.createElement("tr");
      cols.forEach(c=>{
        const td = document.createElement("td");
        td.textContent = (r[c] ?? "");
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

  }catch(e){
    err.textContent = String(e);
  }finally{
    showLoading(false);
  }
}

window.addEventListener("load", ()=>{
  setInputsFromUrl();
  load();
});
</script>

</body>
</html>
