<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WSR Report</title>
  <style>
    :root{
      --bg:#eef4ff; --card:#fff; --text:#0f172a; --muted:#64748b;
      --border:#e5e7eb; --shadow:0 10px 25px rgba(0,0,0,.08);
      --primary:#1a73e8; --radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Segoe UI,system-ui,Arial;background:var(--bg);color:var(--text);}

    /* ✅ overlay blur + loader */
    .overlay{
      position:fixed; inset:0;
      background:rgba(15, 23, 42, 0.10);
      backdrop-filter: blur(3px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }
    .overlay.show{ display:flex; }
    .loaderBox{
      background:#fff;border:1px solid var(--border);border-radius:14px;
      box-shadow:var(--shadow);
      padding:16px 18px;
      display:flex; align-items:center; gap:10px;
      font-weight:800;
      color:var(--text);
      min-width:220px;
      justify-content:center;
    }
    .spinner{
      width:18px;height:18px;border-radius:50%;
      border:3px solid #cbd5e1;
      border-top-color: var(--primary);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    .wrap{max-width:1200px;margin:18px auto;padding:0 14px;}
    .topbar{
      background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:14px 16px; display:flex; align-items:center; justify-content:space-between;
      gap:12px;
    }
    .title h1{margin:0;font-size:18px}
    .title .sub{color:var(--muted);font-size:12px;margin-top:4px}
    .btn{
      border:1px solid var(--border); background:#fff; padding:9px 12px; border-radius:12px;
      cursor:pointer; font-weight:800;
    }
    .btn.primary{background:var(--primary);color:#fff;border-color:transparent;}
    .card{
      margin-top:14px; background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); box-shadow:var(--shadow); padding:14px;
    }
    .toolbar{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    }
    label{color:var(--muted);font-size:13px;font-weight:700}
    .inp{
      height:38px; padding:0 12px; border:1px solid var(--border); border-radius:12px;
      background:#fff; outline:none; font-size:14px;
    }
    .inp.search{border-radius:999px; min-width:260px;}
    .hint{margin-top:10px;color:var(--muted);font-weight:800;font-size:13px;}
    .tableWrap{
      margin-top:12px; overflow:auto; border:1px solid var(--border); border-radius:12px;
      background:#fff;
    }
    table{border-collapse:collapse; min-width:1200px; width:max-content; font-size:13px;}
    thead th{position:sticky;top:0;background:#0b2a55;color:#fff;padding:10px;text-align:left;white-space:nowrap;}
    tbody td{border-top:1px solid var(--border);padding:10px;white-space:nowrap;}
    .err{margin-top:10px;color:#b91c1c;font-weight:800;}
  </style>
</head>
<body>

  <!-- ✅ Blur + Loading -->
  <div id="overlay" class="overlay">
    <div class="loaderBox">
      <div class="spinner"></div>
      <div>Loading report...</div>
    </div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>WSR Report</h1>
        <div class="sub">KGK Jet India</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn" onclick="window.close()">Close Tab</button>
        <button class="btn primary" onclick="loadWSR()">Refresh</button>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <label>Visit Type</label>
        <input id="visitType" class="inp" style="min-width:180px" placeholder="CLUSTER / BREAKDOWN..." />

        <label>From</label>
        <input id="fromDate" class="inp" type="date" />

        <label>To</label>
        <input id="toDate" class="inp" type="date" />

        <input id="q" class="inp search" placeholder="Search (customer / engineer / zone...)" />

        <button class="btn primary" onclick="loadWSR()">Search</button>
      </div>

      <div class="hint">Rows: <b id="rowCount">0</b></div>
      <div id="err" class="err"></div>

      <div class="tableWrap">
        <table id="tbl">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
  function showLoading(show){
    const ov = document.getElementById("overlay");
    if(show) ov.classList.add("show");
    else ov.classList.remove("show");
  }

  function setDefaultsFromQuery(){
    const p = new URLSearchParams(location.search);
    const v = p.get("visitType") || "";
    const f = p.get("from") || "";
    const t = p.get("to") || "";

    document.getElementById("visitType").value = v;
    document.getElementById("fromDate").value = f;
    document.getElementById("toDate").value = t;

    const q = p.get("q") || "";
    document.getElementById("q").value = q;
  }

  async function loadWSR(){
    const errBox = document.getElementById("err");
    errBox.textContent = "";

    const visitType = (document.getElementById("visitType").value || "").trim();
    const from = document.getElementById("fromDate").value || "";
    const to = document.getElementById("toDate").value || "";
    const q = (document.getElementById("q").value || "").trim();

    const params = new URLSearchParams();
    params.set("limit", "2000");

    if(visitType) params.set("visitType", visitType);
    if(q) params.set("q", q);
    if(from) params.set("from", from);
    if(to) params.set("to", to);

    showLoading(true);

    try{
      const res = await fetch("/api/wsr-report?" + params.toString());
      const data = await res.json();

      if(!res.ok || data.error){
        errBox.textContent = data.error || ("HTTP " + res.status);
        drawTable([], []);
        document.getElementById("rowCount").textContent = "0";
        return;
      }

      const cols = data.columns || [];
      const rows = data.rows || [];
      document.getElementById("rowCount").textContent = String(rows.length || 0);
      drawTable(cols, rows);

    }catch(e){
      errBox.textContent = String(e);
      drawTable([], []);
      document.getElementById("rowCount").textContent = "0";
    }finally{
      showLoading(false);
    }
  }

  function drawTable(cols, rows){
    const table = document.getElementById("tbl");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");
    thead.innerHTML = "";
    tbody.innerHTML = "";

    if(!cols || !cols.length){
      thead.innerHTML = "<tr><th>No columns</th></tr>";
      return;
    }

    const trh = document.createElement("tr");
    cols.forEach(c=>{
      const th = document.createElement("th");
      th.textContent = c;
      trh.appendChild(th);
    });
    thead.appendChild(trh);

    rows.forEach(r=>{
      const tr = document.createElement("tr");
      cols.forEach(c=>{
        const td = document.createElement("td");
        td.textContent = (r[c] ?? "");
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  setDefaultsFromQuery();
  loadWSR();
</script>
</body>
</html>
